<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Employee Salary Details</h2>

<table>
    <tr>
        <th>Employee Name</th>
        <th>Department</th>
        <th>Salary (₹)</th>
    </tr>
    <tr>
        <td>Ravi</td>
        <td>IT</td>
        <td>50000</td>
    </tr>
    <tr>
        <td>Sneha</td>
        <td>HR</td>
        <td>45000</td>
    </tr>
    <tr>
        <td>Arjun</td>
        <td>Finance</td>
        <td>60000</td>
    </tr>
</table>

</body>
</html>
